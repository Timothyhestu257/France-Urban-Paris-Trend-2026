<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France-Webdas</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="page-container">

        <header class="header">
            <p class="header-intro-text">
                Find your signature style with collections influenced by the fashion capital of the world.
            </p>
            <h1 class="header-title">EXPLORE YOUR STYLE</h1>
        </header>

    
        <main class="gallery-container">
        
            <article class="style-card">
                <div class="card-image">
                    <div>
                        <img src="haute.png" alt="">
                    </div>
                </div>
                <h2 class="card-label">HAUTE COUTURE</h2>
            </article>

    
            <article class="style-card">
                <div class="card-image">
                    <div>
                        <img src="street.png" alt="">
                    </div>
                </div>
                <h2 class="card-label">PARIS STREETWEAR</h2>
            </article>

    
            <article class="style-card">
                <div class="card-image">
                    <div>
                       <img src="bohemian.png" alt="">
                    </div>
                </div>
                <h2 class="card-label">BOHEMIAN PARIS STYLE</h2>
            </article>
            
        
            <article class="style-card">
                <div class="card-image">
                    <div>
                       Kosong Cuy
                    </div>
                </div>
                <h2 class="card-label">CLASSIC PARISIAN</h2>
            </article>
        </main>
    </div>
</body>
</html>
