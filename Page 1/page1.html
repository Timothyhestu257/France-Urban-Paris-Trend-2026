<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>France-Webdas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="landing-page">
      <header>
        <div class="logo">Urbané</div>
      </header>
      <main>
        <div class="content">
          <div class="year">2026</div>
          <h1>PARIS FASHION<br />TREND</h1>

                <label class="lab-email" for="">Email:</label>
                <input class="email" type="text" placeholder /><br />
                <label class="lab-password" for="">Password:</label>
                <input class="password" type="password" /><br />
              </form>
              <a href="/Page 2/page2.html" class="explore-btn">Log In</a>
              <p>don't have an account yet?</p>
              <a
                href="#"
                class="explore-btn2"
                onclick="
                  event.preventDefault();
                  renderRegisterForm();
                "
                >Create Account</a
              >
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
