<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>France-Webdas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="landing-page">
      <!-- Ini navbar -->
      <navbar class="navbar">
        <div class="logo">Urbané</div>

        <div class="nav">
          <a href="../AboutUs/aboutus.html">About Us</a>
        </div>
      </navbar>

      <main>
        <div class="content">
          <div class="year">2026</div>
          <h1>PARIS FASHION<br />TREND</h1>

          <!-- Ini bagian form -->
          <div id="auth-container">
            <div id="div-login" class="form-container">
              <form class="input">
                <h2>LogIn</h2>
                <label class="lab-email" for="">Email:</label>
                <input id="email" class="email" type="text"/><br />
                <label class="lab-password" for="">Password:</label>
                <input id="password" class="password" type="password"/><br />
              </form>

              <a href="#" class="explore-btn" onclick="login()">Log In</a>

              <p>don't have an account yet?</p>
              <a
                href="#"
                class="explore-btn2"
                onclick="
                  event.preventDefault();
                  renderRegisterForm();
                "
                >Create Account</a
              >
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
